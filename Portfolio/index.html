<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIS 216 - Spring 2026 - Wednesdays</title>
    <title>My First Web Page</title>

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- Internal CSS -->
    <style>
        body {
            background-color: lightgray;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>CIS 216 - Spring 2026 - Wednesdays</h1>

    <!-- Header -->
    <header class="header-box">
        <h1>My First Web Page</h1>
    </header>

    <!-- Main Content -->
    <main class="main-box">

        <p>This is my first HTML page. I'm learning how to build websites!</p>

        <!-- Figure with image + caption -->
        <figure>
            <img src="https://via.placeholder.com/150" alt="Sample Image">
            <figcaption>This is a sample image</figcaption>
        </figure>

        <!-- Anchor -->
        <a href="https://www.google.com" target="_blank">
            Visit Google
        </a>

        <!-- Inline Styling -->
        <p style="color: red; font-weight: bold;">
            This text uses inline styling!
        </p>

        <!-- Flexbox example -->
        <div class="flex-container">
            <div>Box 1</div>
            <div>Box 2</div>
        </div>

        <!-- Grid example -->
        <div class="grid-container">
            <div>Grid 1</div>
            <div>Grid 2</div>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
