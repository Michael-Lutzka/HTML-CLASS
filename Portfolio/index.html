<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>My First Web Page</title>

    <!-- Internal CSS (style element) -->
    <style>
        body {
            background-color: lightgray;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header class="header-box">
        <h1>My First Web Page</h1>
    </header>

    <!-- Main Content -->
    <main class="main-box">
        <p>This is my first HTML page. I'm learning how to build websites!</p>

        <!-- Anchor (opens in new tab) -->
        <a href="https://www.google.com" target="_blank">
            Visit Google
        </a>

        <!-- Inline Styling -->
        <p style="color: red; font-weight: bold;">
            This text uses inline styling!
        </p>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
